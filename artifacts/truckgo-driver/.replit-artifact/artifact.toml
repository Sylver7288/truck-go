kind = "mobile"
previewPath = "/truckgo-driver/"
title = "TruckGo Driver App"
version = "1.0.0"
id = "artifacts/truckgo-driver"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/truckgo-driver/" ]
localPort = 24609

[services.development]
run = "pnpm --filter @workspace/truckgo-driver run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/truckgo-driver", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/truckgo-driver", "run", "serve" ]

[services.env]
PORT = "24609"
BASE_PATH = "/truckgo-driver/"
